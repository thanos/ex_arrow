name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.18"]
        otp: ["27"]

    steps:
      - name: Wait for GitHub API
        run: |
          max_attempts=12
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -sf --connect-timeout 5 https://api.github.com > /dev/null; then
              echo "Connected to api.github.com on attempt $attempt"
              break
            fi
            echo "Attempt $attempt/$max_attempts: waiting for network connectivity to api.github.com..."
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "::error::Could not reach api.github.com after $max_attempts attempts. Check network/connectivity."
              exit 1
            fi
            sleep 5
          done

      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock', 'lib/**/*.ex', 'config/**', 'native/ex_arrow_native/**') }}
          restore-keys: |
            mix-build-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_arrow_native/target
          key: rust-target-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('native/ex_arrow_native/Cargo.lock', 'native/ex_arrow_native/Cargo.toml', 'native/ex_arrow_native/src/**') }}
          restore-keys: |
            rust-target-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        env:
          EX_ARROW_BUILD: "1"
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Build docs
        run: mix docs --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Sobelow
        run: mix sobelow --exit --skip

      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Dialyzer
        run: mix dialyzer

      - name: Run tests
        run: mix test

      - name: Test coverage and check threshold (70%)
        run: |
          mix coveralls.html  --include adbc_package:true 2>&1 | tee coveralls.log
          COV=$(grep '^\[TOTAL\]' coveralls.log | awk '{gsub(/%/,""); print $2}')
          if [ -z "$COV" ]; then
            echo "::error::Could not parse coverage from coveralls output"
            exit 1
          fi
          echo "Coverage: ${COV}% (threshold: 70%)"
          if [ "$(printf '%s\n' "70" "$COV" | sort -n | head -1)" != "70" ]; then
            echo "::error::Coverage ${COV}% is below 70% threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/



  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub API
        run: |
          max_attempts=12
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -sf --connect-timeout 5 https://api.github.com > /dev/null; then
              echo "Connected to api.github.com on attempt $attempt"
              break
            fi
            echo "Attempt $attempt/$max_attempts: waiting for network connectivity to api.github.com..."
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "::error::Could not reach api.github.com after $max_attempts attempts. Check network/connectivity."
              exit 1
            fi
            sleep 5
          done

      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-rust-27-1.18-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-rust-27-1.18-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_arrow_native/target
          key: rust-target-${{ hashFiles('native/ex_arrow_native/Cargo.lock', 'native/ex_arrow_native/Cargo.toml', 'native/ex_arrow_native/src/**') }}
          restore-keys: |
            rust-target-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (includes NIF)
        env:
          EX_ARROW_BUILD: "1"
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Test coverage and check threshold (70%)
        run: |
          mix coveralls.html 2>&1 | tee coveralls.log
          COV=$(grep '^\[TOTAL\]' coveralls.log | awk '{gsub(/%/,""); print $2}')
          if [ -z "$COV" ]; then
            echo "::error::Could not parse coverage from coveralls output"
            exit 1
          fi
          echo "Coverage: ${COV}% (threshold: 70%)"
          if [ "$(printf '%s\n' "70" "$COV" | sort -n | head -1)" != "70" ]; then
            echo "::error::Coverage ${COV}% is below 70% threshold"
            exit 1
          fi
