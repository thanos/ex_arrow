name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip NIF for all jobs by default — no download, no compile, just stubs.
# The test-rust job overrides this with EX_ARROW_BUILD=1 and EX_ARROW_SKIP_NIF=false.
env:
  EX_ARROW_SKIP_NIF: "1"

jobs:
  # ── Lint: format, credo, sobelow, docs ──────────────────────────────────────
  lint:
    name: Lint (format, credo, sobelow, docs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-lint-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-lint-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-lint-1.18-27-${{ hashFiles('mix.lock', 'lib/**/*.ex') }}
          restore-keys: |
            mix-build-lint-1.18-27-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix sobelow --exit --skip
      - run: mix docs --warnings-as-errors
        env:
          MIX_ENV: dev

  # ── Dialyzer ─────────────────────────────────────────────────────────────────
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-dialyzer-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-dialyzer-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-dialyzer-1.18-27-${{ hashFiles('mix.lock', 'lib/**/*.ex') }}
          restore-keys: |
            mix-build-dialyzer-1.18-27-

      - name: Restore Dialyzer PLT cache
        id: plt-cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-1.18-27-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-1.18-27-

      - run: mix deps.get
      - run: mkdir -p priv/plts
      - name: Remove stale PLT on cache miss
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: rm -f priv/plts/project.plt
      - run: mix dialyzer

  # ── Test with Rust NIF ────────────────────────────────────────────────────────
  test:
    name: Test ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
            coverage: true

    env:
      # Override workflow-level skip: this job compiles and loads the real NIF.
      EX_ARROW_SKIP_NIF: "false"
      EX_ARROW_BUILD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-test-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-test-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-test-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock', 'lib/**/*.ex', 'native/ex_arrow_native/**') }}
          restore-keys: |
            mix-build-test-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('native/ex_arrow_native/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_arrow_native/target
          key: rust-target-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('native/ex_arrow_native/Cargo.lock', 'native/ex_arrow_native/src/**') }}
          restore-keys: |
            rust-target-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: |
          mix coveralls.html --include adbc_package:true 2>&1 | tee coveralls.log
          COV=$(grep '^\[TOTAL\]' coveralls.log | awk '{gsub(/%/,""); print $2}')
          if [ -z "$COV" ]; then
            echo "::error::Could not parse coverage from coveralls output"
            exit 1
          fi
          echo "Coverage: ${COV}% (threshold: 70%)"
          if [ "$(printf '%s\n' "70" "$COV" | sort -n | head -1)" != "70" ]; then
            echo "::error::Coverage ${COV}% is below 70% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
