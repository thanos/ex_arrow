name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.18"]
        otp: ["27"]

    steps:
      - name: Wait for GitHub API
        run: |
          max_attempts=12
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -sf --connect-timeout 5 https://api.github.com > /dev/null; then
              echo "Connected to api.github.com on attempt $attempt"
              break
            fi
            echo "Attempt $attempt/$max_attempts: waiting for network connectivity to api.github.com..."
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "::error::Could not reach api.github.com after $max_attempts attempts. Check network/connectivity."
              exit 1
            fi
            sleep 5
          done

      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Run tests
        run: mix test

      - name: Test coverage
        run: mix coveralls.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/

      - name: Build docs
        run: mix docs

  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub API
        run: |
          max_attempts=12
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if curl -sf --connect-timeout 5 https://api.github.com > /dev/null; then
              echo "Connected to api.github.com on attempt $attempt"
              break
            fi
            echo "Attempt $attempt/$max_attempts: waiting for network connectivity to api.github.com..."
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "::error::Could not reach api.github.com after $max_attempts attempts. Check network/connectivity."
              exit 1
            fi
            sleep 5
          done

      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore dependencies
        run: mix deps.get

      - name: Compile (includes NIF)
        run: mix compile --force

      - name: Run tests
        run: mix test

      - name: Test coverage
        run: mix coveralls.html
