name: Integration Tests

# Run against live database services (PostgreSQL, DuckDB).
# Triggered manually or on pushes/PRs to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgresql:
    name: ADBC / PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16"]

    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      EX_ARROW_BUILD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-integration-pg-27-1.18-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-integration-pg-27-1.18-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-integration-pg-27-1.18-${{ hashFiles('mix.lock', 'lib/**/*.ex', 'native/ex_arrow_native/**') }}
          restore-keys: |
            mix-build-integration-pg-27-1.18-

      - name: Restore Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('native/ex_arrow_native/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_arrow_native/target
          key: rust-target-integration-pg-${{ hashFiles('native/ex_arrow_native/Cargo.lock', 'native/ex_arrow_native/src/**') }}
          restore-keys: |
            rust-target-integration-pg-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-adbc-postgresql-${{ runner.os }}
          restore-keys: |
            pip-adbc-postgresql-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      # Install the official Apache ADBC PostgreSQL driver via pip.
      # The Python wheel ships a precompiled libadbc_driver_postgresql.so that
      # we can pass directly as driver_path — no system-wide install needed.
      # The pip cache above means the wheel is only downloaded on first run.
      - name: Download ADBC PostgreSQL driver
        run: |
          pip3 install --quiet "adbc-driver-postgresql"
          DRIVER_PATH=$(python3 -c "import adbc_driver_postgresql, pathlib; p=pathlib.Path(adbc_driver_postgresql.__file__).parent; c=sorted(p.glob('*.so*'))+sorted(p.glob('lib/*.so*')); print(c[0]) if c else exit('no .so found in adbc-driver-postgresql')")
          echo "Found PG ADBC driver: $DRIVER_PATH"
          echo "PG_ADBC_DRIVER=$DRIVER_PATH" >> "$GITHUB_ENV"

      - name: Run PostgreSQL integration tests
        run: mix test --include adbc_integration test/ex_arrow/adbc_integration_test.exs

  # ── DuckDB ────────────────────────────────────────────────────────────────────
  duckdb:
    name: ADBC / DuckDB ${{ matrix.duckdb }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Use the main DuckDB release; duckdb/duckdb-adbc no longer exists.
        # libduckdb.so exports duckdb_adbc_init directly since DuckDB v1.0.
        duckdb: ["1.1.3", "1.2.0"]

    env:
      EX_ARROW_BUILD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-integration-duckdb-27-1.18-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-integration-duckdb-27-1.18-

      - name: Restore Mix build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: mix-build-integration-duckdb-27-1.18-${{ hashFiles('mix.lock', 'lib/**/*.ex', 'native/ex_arrow_native/**') }}
          restore-keys: |
            mix-build-integration-duckdb-27-1.18-

      - name: Restore Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('native/ex_arrow_native/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_arrow_native/target
          key: rust-target-integration-duckdb-${{ hashFiles('native/ex_arrow_native/Cargo.lock', 'native/ex_arrow_native/src/**') }}
          restore-keys: |
            rust-target-integration-duckdb-

      - name: Restore DuckDB binary cache
        id: duckdb-cache
        uses: actions/cache@v4
        with:
          path: /opt/duckdb/${{ matrix.duckdb }}
          key: duckdb-${{ matrix.duckdb }}-linux-amd64

      - name: Download DuckDB ADBC driver
        if: steps.duckdb-cache.outputs.cache-hit != 'true'
        run: |
          DUCKDB_VERSION="${{ matrix.duckdb }}"
          # The duckdb/duckdb-adbc repo no longer exists.
          # Since DuckDB v1.0 the ADBC interface (duckdb_adbc_init) is built
          # directly into libduckdb.so in the main DuckDB release.
          DOWNLOAD_URL="https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip"
          echo "Downloading DuckDB v${DUCKDB_VERSION} from: $DOWNLOAD_URL"
          mkdir -p /opt/duckdb/${DUCKDB_VERSION}
          curl -fsSL "$DOWNLOAD_URL" -o /tmp/duckdb_adbc.zip
          # Sanity-check: must be a zip archive, not an HTML error page.
          file /tmp/duckdb_adbc.zip
          # unzip is pre-installed on ubuntu-latest
          unzip -o /tmp/duckdb_adbc.zip -d /opt/duckdb/${DUCKDB_VERSION}

      - name: Set DuckDB driver path
        run: |
          DRIVER_PATH=$(find /opt/duckdb/${{ matrix.duckdb }} -name "libduckdb.so" | head -1)
          if [ -z "$DRIVER_PATH" ]; then
            echo "::error::Could not find libduckdb.so"
            ls -la /opt/duckdb/${{ matrix.duckdb }}/
            exit 1
          fi
          echo "DUCKDB_DRIVER=$DRIVER_PATH" >> "$GITHUB_ENV"
          echo "Found DuckDB ADBC driver at: $DRIVER_PATH"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run DuckDB integration tests
        run: mix test --include adbc_integration test/ex_arrow/adbc_integration_test.exs
